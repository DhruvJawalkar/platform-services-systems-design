apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: platform-demo
  labels:
    app: payments-service
    platform.layer: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
        platform.layer: application
    spec:
      containers:
        - name: payments-service
          image: payments-service:phase2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payments-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: platform-demo
spec:
  selector:
    app: payments-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
