apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: platform-demo
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: platform-demo
        orgId: 1
        folder: Platform Demo
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  platform-services-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count[1m])) by (application)"}],
          "title": "Request Rate by Service",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [{"expr": "sum(http_server_requests_seconds_count) by (application, status)"}],
          "title": "Request Volume by Status",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [{"expr": "sum(rate(jvm_memory_used_bytes[1m])) by (application)"}],
          "title": "JVM Memory Usage Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [{"expr": "sum(rate(process_cpu_usage[1m])) by (application)"}],
          "title": "CPU Usage Rate",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["platform-demo"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "browser",
      "title": "Platform Services Overview",
      "version": 1
    }
