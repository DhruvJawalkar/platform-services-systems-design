apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: platform-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.platform-demo.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.platform-demo.svc.cluster.local:3100
        editable: false
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.platform-demo.svc.cluster.local:3200
        editable: false
        jsonData:
          tracesToLogs:
            datasourceUid: loki
