apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: platform-demo
data:
  collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
      prometheus:
        config:
          scrape_configs:
            - job_name: orders-service
              metrics_path: /actuator/prometheus
              static_configs:
                - targets: ["orders-service.platform-demo.svc.cluster.local:80"]
            - job_name: payments-service
              metrics_path: /actuator/prometheus
              static_configs:
                - targets: ["payments-service.platform-demo.svc.cluster.local:80"]

    processors:
      batch:

    exporters:
      logging:
        loglevel: info
      prometheus:
        endpoint: "0.0.0.0:8889"
      otlp/tempo:
        endpoint: tempo.platform-demo.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [prometheus, otlp]
          processors: [batch]
          exporters: [logging, prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging, otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]
