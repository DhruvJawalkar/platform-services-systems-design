apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: platform-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector.platform-demo.svc.cluster.local:8889"]
